<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Heatmap Visualization</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      margin: 0;
      background: #0b0e11;
      color: #eaeaea;
    }

    header {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1f24;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .title {
      font-weight: 600;
      letter-spacing: .2px;
    }

    .controls {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select,
    input[type="range"] {
      background: #12161b;
      color: #eaeaea;
      border: 1px solid #1f252b;
      border-radius: 8px;
      padding: 6px 8px;
    }

    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      opacity: .9;
    }

    .swatch {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 3px;
      border: 1px solid #111;
    }

    .grad {
      width: 80px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid #111;
      background: linear-gradient(90deg, #d73027, #fdae61, #fee08b, #a6d96a, #1a9850);
    }

    #chart {
      width: 100%;
      height: calc(100vh - 70px);
    }

    .footer {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 12px;
      opacity: .6;
    }

    button {
      background: #12161b;
      color: #eaeaea;
      border: 1px solid #1f252b;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: #2c343b;
    }

    /* Removed fixed positioning for export button */
  </style>
</head>

<body x-data="heatmapApp()">
  <header>
    <div class="title">Heatmap Visualization</div>

    <div class="legend" x-data x-init="(()=>{ /* gradient colors are dynamic; we set them in JS later */ })()">
      <span class="swatch" style="background:#222"></span> <span>no data</span>
      <span class="swatch" style="background:#555"></span> <span>0</span>
      <span class="grad" id="legend-grad"></span> <span id="legend-value">value ↑</span>
    </div>

    <div class="controls">
      <button @click="prev()">⟨</button>
      <select x-model="month" @change="update()">
        <template x-for="m in months" :key="m">
          <option x-text="m"></option>
        </template>
      </select>
      <button id="exportPng" @click="exportPNG()">Export PNG</button>  <!-- Moved beside the select dropdown -->
      <button @click="next()">⟩</button>

      <input type="range" :min="0" :max="months.length-1" step="1" x-model.number="slider"
        @input="month = months[slider]; update()" style="width:220px">
    </div>
  </header>

  <div id="chart"></div>
  <div class="footer" x-text="`${labels.size}: ${meta.size_min} – ${meta.size_max} | ${labels.value}`"></div>

  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <script>
  function heatmapApp() {
    const jsonFolder = "json_data/";
    const fileMap = {
      "2023-04": "2023-04.json",
      "2023-05": "2023-05.json",
      "2023-10": "2023-10.json",
      "2024-05": "2024-05.json",
      "2025-03": "2025-03.json",
      "2025-10": "2025-10.json"
    };

    const months = Object.keys(fileMap);

    let meta = {};
    let datasets = {};
    let labels = {
      x: "Position",
      y: "Row",
      value: "Condition",
      size: "Height",
      extras: ["species", "ants", "locusts", "notes"]
    };

    async function loadData() {
      datasets = {};
      const allValues = [];
      const allSizes = [];
      let xMax = 0;
      let yMax = 0;

      for (const month of months) {
        try {
          const response = await fetch(jsonFolder + fileMap[month]);
          if (!response.ok) throw new Error(`Failed to load ${month}`);
          const raw = await response.json();

          const points = raw.map(r => ({
            x: Number(r.position),
            y: Number(r.row),
            value: Number(r.condition),
            size: Number(r.height),
            extras: {
              species: r.species,
              ants: r.ants,
              locusts: r.locusts,
              notes: r.notes
            }
          }));

          datasets[month] = { points };

          points.forEach(p => {
            allValues.push(p.value);
            allSizes.push(p.size);
            xMax = Math.max(xMax, p.x);
            yMax = Math.max(yMax, p.y);
          });
        } catch (error) {
          console.error(`Error loading ${month}:`, error);
        }
      }

      meta = {
        months,
        x_max: xMax,
        y_max: yMax,
        value_min_pos: Math.min(...allValues.filter(v => v > 0)),
        value_max: Math.max(...allValues),
        size_min: Math.min(...allSizes),
        size_max: Math.max(...allSizes),
        grad_colors: ["#d73027", "#fdae61", "#fee08b", "#a6d96a", "#1a9850"],
        zero_color: "#555",
        nodata_color: "#222",
        labels
      };

      initLegendGradient();
    }

    function initLegendGradient() {
      const gradEl = document.getElementById("legend-grad");
      gradEl.style.background = `linear-gradient(90deg, ${meta.grad_colors.join(",")})`;
      document.getElementById("legend-value").textContent = labels.value + " ↑";
    }

    function categories(n) {
      return Array.from({ length: n }, (_, i) => (i + 1).toString());
    }

    function buildPoints(ds) {
      const map = new Map();
      ds.points.forEach(p => map.set(p.x + "-" + p.y, p));

      const out = [];
      for (let x = 1; x <= meta.x_max; x++) {
        for (let y = 1; y <= meta.y_max; y++) {
          const key = x + "-" + y;
          const p = map.get(key);
          out.push({
            id: key,
            value: [x - 1, y - 1, p ? p.value : -1, p ? p.size : 0],
            extras: p ? p.extras : {}
          });
        }
      }
      return out;
    }

    function buildOption(monthKey) {
      const ds = datasets[monthKey];
      const heat = ds.points.map(p => [p.x - 1, p.y - 1, p.value]);
      const points = buildPoints(ds);

      return {
        backgroundColor: "#0b0e11",

        tooltip: {
          trigger: "item",
          formatter: params => {
            const v = params.value;
            const z = Number(v[2]);
            const g = Number(v[3]);

            let lines = [
              `${labels.x}: ${v[0] + 1}`,
              `${labels.y}: ${v[1] + 1}`,
              z < 0 ? "no data" : `${labels.value}: ${z}`,
              `${labels.size}: ${g}`
            ];

            const e = params.data.extras || {};
            for (const k of labels.extras) {
              if (e[k] !== null && e[k] !== undefined && e[k] !== "")
                lines.push(`${k}: ${e[k]}`);
            }

            return lines.join("<br/>");
          }
        },

        grid: { left: 50, right: 20, top: 40, bottom: 40, containLabel: true },

        xAxis: {
          type: "category",
          data: categories(meta.x_max),
          name: labels.x,
          nameTextStyle: { color: "#9aa4ad" },
          axisLine: { lineStyle: { color: "#6b7782" } },
          axisLabel: { color: "#cbd5dc" },
          splitLine: { show: true, lineStyle: { color: "#ffffff", width: 1.5 } },
          splitArea: { show: false }
        },

        yAxis: {
          type: "category",
          data: categories(meta.y_max),
          name: labels.y,
          nameTextStyle: { color: "#9aa4ad" },
          axisLine: { lineStyle: { color: "#6b7782" } },
          axisLabel: { color: "#cbd5dc" },
          splitLine: { show: true, lineStyle: { color: "#ffffff", width: 1.5 } },
          splitArea: { show: false }
        },

        visualMap: [{
          type: "continuous",
          min: meta.value_min_pos,
          max: meta.value_max,
          show: false,
          inRange: { color: meta.grad_colors }
        }],

        series: [
          {
            type: "heatmap",
            data: heat,
            itemStyle: {
              borderWidth: 1,
              borderColor: "#2c343b"
            }
          },
          {
            type: "scatter",
            data: points,
            symbolSize: val => {
              const t = (val[3] - meta.size_min) / (meta.size_max - meta.size_min || 1);
              return Math.max(6, Math.min(28, 6 + t * 22));
            },
            itemStyle: {
              borderColor: "#000",
              borderWidth: 0.8
            },
            encode: { x: 0, y: 1 }
          }
        ]
      };
    }

    return {
      meta, months, labels,
      month: months[0],
      slider: 0,

      async init() {
        await loadData();
        window.chart = echarts.init(document.getElementById("chart"));
        this.update();
        window.addEventListener("resize", () => window.chart.resize());
      },

      update() {
        this.slider = this.months.indexOf(this.month);
        window.chart.setOption(buildOption(this.month), true);
      },

      prev() {
        this.slider = Math.max(0, this.slider - 1);
        this.month = this.months[this.slider];
        this.update();
      },

      next() {
        this.slider = Math.min(this.months.length - 1, this.slider + 1);
        this.month = this.months[this.slider];
        this.update();
      },

      exportPNG() {
        console.log("Export button clicked");
        if (!window.chart) {
          console.error("Chart not initialized");
          return;
        }
        try {
          const url = window.chart.getDataURL({
            type: "png",
            pixelRatio: 2,
            backgroundColor: "#ffffff"
          });
          console.log("Generated URL:", url);
          const a = document.createElement("a");
          a.href = url;
          a.download = `grovegrid-${this.month}.png`;
          a.click();
          console.log("Download triggered");
        } catch (error) {
          console.error("Export failed:", error);
        }
      }
    };
  }
</script>
</body>
</html>
